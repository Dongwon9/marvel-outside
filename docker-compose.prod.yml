# Marvel Outside Production Environment
# Backend (NestJS) + Frontend (Nginx) + Redis
# PostgreSQL은 외부 관리형 DB 서비스 사용 (DATABASE_URL 환경변수로 연결)

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: marvel_backend_prod
    env_file:
      - ./backend/.env.prod
    environment:
      NODE_ENV: production
      TZ: Asia/Seoul
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - marvel_network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: marvel_frontend_prod
    ports:
      - "80:80"
    environment:
      BACKEND_URL: http://backend:3000
      TZ: Asia/Seoul
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - marvel_network
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    container_name: marvel_redis_prod
    environment:
      TZ: Asia/Seoul
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-marvel_redis_password}
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "--no-auth-warning",
          "-a",
          "${REDIS_PASSWORD:-marvel_redis_password}",
          "ping",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - marvel_network
    restart: unless-stopped

volumes:
  redis_data:
    driver: local

networks:
  marvel_network:
    driver: bridge
