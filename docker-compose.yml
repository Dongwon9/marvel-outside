# Marvel Outside Development Environment
# Backend (NestJS), Frontend (React + Vite), Redis 개발 서버 구성

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.dev
    container_name: marvel_backend_dev
    working_dir: /workspace/backend
    command: pnpm run start:dev
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      TZ: Asia/Seoul
    volumes:
      - ./backend:/workspace/backend
      - ./backend/node_modules:/workspace/backend/node_modules
      - ./package.json:/workspace/package.json:ro
      - ./pnpm-lock.yaml:/workspace/pnpm-lock.yaml:ro
      - ./pnpm-workspace.yaml:/workspace/pnpm-workspace.yaml:ro
      - ./backend/scripts/docker-entrypoint.sh:/workspace/docker-entrypoint.sh
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - marvel_network
    entrypoint: ["/workspace/docker-entrypoint.sh"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.dev
    container_name: marvel_frontend_dev
    working_dir: /workspace/frontend
    command: pnpm -F frontend run start:dev
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env
    environment:
      NODE_ENV: development
      TZ: Asia/Seoul
    volumes:
      - ./frontend:/workspace/frontend
      - ./frontend/node_modules:/workspace/frontend/node_modules
      - ./package.json:/workspace/package.json:ro
      - ./pnpm-lock.yaml:/workspace/pnpm-lock.yaml:ro
      - ./pnpm-workspace.yaml:/workspace/pnpm-workspace.yaml:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - marvel_network
    restart: unless-stopped

  postgres:
    image: postgres:18
    container_name: marvel_postgres_dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: marvel_password
      POSTGRES_DB: postgres
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - marvel_network
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    container_name: marvel_redis_dev
    environment:
      TZ: Asia/Seoul
      REDIS_PASSWORD: ${REDIS_PASSWORD:-marvel_redis_password}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-marvel_redis_password}
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "--no-auth-warning",
          "-a",
          "${REDIS_PASSWORD:-marvel_redis_password}",
          "ping",
        ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - marvel_network
    restart: unless-stopped

# Volumes for data persistence
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# Network configuration
networks:
  marvel_network:
    driver: bridge
    ipam:
      driver: default
